<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=11" />
    <!--<meta http-equiv="X-UA-Compatible" content="IE=edge">-->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>MSM - Terminal MES Mahou San Miguel</title>
    <link rel="shortcut icon" id="favicon" type="image/x-icon" href="#" />
    <link href="/LibreriasJS/libs/pNotify/pnotify.custom.min.css" rel="stylesheet" />
    <link href="/LibreriasJS/libs/jqueryMobile/jquery.mobile-1.4.5.min.css" rel="stylesheet" />
    <link href="/LibreriasJS/libs/kendoUI/styles/kendo.common.min.css" rel="stylesheet" />
    <link href="/LibreriasJS/libs/kendoUI/styles/kendo.default.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/LibreriasJS/libs/kendoUI/styles/kendo.dataviz.min.css" />
    <link rel="stylesheet" href="/LibreriasJS/libs/kendoUI/styles/kendo.dataviz.default.min.css" />
    <link href="/LibreriasJS/libs/kendoUI/styles/kendo.mobile.all.min.css" rel="stylesheet" />
    <link href="/LibreriasJS/libs/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/sticky-footer-navbar.css" rel="stylesheet" />
    <link href="css/terminal.css" rel="stylesheet" />
    <link href="/LibreriasJS/libs/jqueryUI/jquery-ui.min.css" rel="stylesheet" />
    <link href="/LibreriasJS/libs/keyboard/css/keyboard.min.css" rel="stylesheet" />
    <link href="/LibreriasJS/libs/vis/vis.min.css" rel="stylesheet" />
    <script src="/LibreriasJS/libs/vis/moment-with-locales.min.js"></script>

    <script src="../LibreriasJS/libs/kendoUI/cultures/kendo.culture.es-ES.min.js"></script>
    <script src="../LibreriasJS/libs/kendoUI/cultures/kendo.culture.en-GB.min.js"></script>

    <script>require = { urlArgs: "v=1.0.0" }</script>
    <script data-main="js/main" src="/LibreriasJS/libs/require/require.js"></script>

</head>

<body>
    <!-- CABECERA -->
    <div id="header">
        <nav class="navbar navbar-default navbar-fixed-top">
            <div class="container">
                <div class="navbar-header">
                    <!-- BOTON MENUS COLAPSADOS -->
                    <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar" aria-expanded="false" aria-controls="navbar">
                        <span class="sr-only">Toggle navigation</span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                    </button>
                    <!-- LOGO -->
                    <div>
                        <div style="text-align: center;">
                                <img id="logo" src="" />
                            </div>
                        <div id="lblNombrePlanta" style="text-align: center;font-weight:bold;font-size:20px;"></div>
                    </div>
                  
                </div>
                <!-- MENUS PRINCIPALES -->
                <div id="navbar" class="collapse navbar-collapse">
                    <ul id="menuPrincipal" class="nav navbar-nav"></ul>
                    <ul class="nav navbar-nav navbar-right">
                        <li><a id="aConfig"><img id="btnConfig" src="img/settings.png" width="56" height="60" /></a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
 
    <div id="content">
        <!-- MENUS SECUNDARIO -->
        <div id="divMenuSecundario" style="display: inline-block;">
            <button id="btnCerrarMenuSec" class="k-button botonMenu" style="float:left;height:70px;"></button>
            <ul id="menuSecundario" class="nav navbar-nav"></ul>
            <ul class="nav navbar-nav navbar-right">
            </ul>
        </div>
        <!-- PANEL LOADER -->
        <div id="loader" class="spinner">
            Cargando Interfaz MES
            <div class="bounce1"></div>
            <div class="bounce2"></div>
            <div class="bounce3"></div>
        </div>
        <!-- PANEL PRINCIPAL VISTAS -->
        <div id="panel">
            <div style="display:flex; flex-direction:column; height: 100%">
                <div class="alert alert-danger" role="alert" id="alrtMensajeAdministracion" name="alrtMensajeAdministracion" style="margin:0; padding: 7px; display: none; margin-bottom: 0;"></div>
                <div id="center-pane" style="flex-grow:1"></div>
            </div>
        </div>
    </div>

    <!-- BARRA FOOTER -->
    <div id="footer">
        <img id="imgReloj" src="img/clock.png" /> <label id="lblFecHoraSistema"></label>
        <img id="imgUsuario" src="img/user.png" /> <label id="lblUsuario"></label>
        <img id="imgLineaZona" src="img/machine.png" /><label id="lblLineaZona"></label>
        <img id="imgPantalla" src="img/screen.png" /><label id="lblPantalla"></label>
        <!--<label id="lblEstadoDatos">Estado datos:</label><img id="imgDatosOK" src="img/ok.png" />-->
        <div id="divChat" style="float:right;width:70px;text-align:center;">
            <img id="imgChat" src="img/chat.png"/><label id="lblChat"></label>
        </div>
    </div>
</body>
</html>

<style>
    .cabeceraVista {
        border: 1px solid black;
        width: auto;
        height: 26px;
        background-color: darkred;
        color: white;
        padding: 3px;
        padding-left: 10px;
        font-size: 20px;
    }

    .k-i-arrow-s {
        margin-top: 10px;
    }

    .k-add {
        margin-top: 4px;
    }
</style>

<div class="cabeceraVista">
    <img src="img/iconoCabecera.png" />
    <span><% print(window.app.idioma.t("SSCC_PALET_MUESTRA")) %></span>
</div>
<div id="divSSCCPaletMuestra" style="padding-top: 5px">
    <label style="margin-left: 5px;"><% print(window.app.idioma.t('INTRODUZCA_SSCC')) %></label>
    <input type="text" id="txtSSCCPaletMuestra" class='k-textbox' style="margin-left: 5px;" inputmode="numeric" pattern="[0-9]*" maxlength="18" 
           oninput="this.value = this.value.replace(/[^0-9]/g, '');"/>
    <button id="btnGuardarSSCC" class="k-button k-button-icontext" style="margin-left: 5px; background-color: green; color: white;">
        <span class='k-icon k-add'></span><% print(window.app.idioma.t('GUARDAR')) %>
    </button>
</div>

<style>
    .cPanelCfg {
        background-color:lightgray;
        width:250px;
        height:100%;
        position:absolute;
        right:0px;
        top:0px;
        border-left:1px solid gray;
        z-index:9999;
    }

    .cabeceraPanel {
        border: 1px solid black;
        width: auto;
        height: 26px;
        background-color: darkred;
        color: white;
        padding: 3px;
        padding-left: 10px;
        font-size: 20px;
    }

    #opciones{
        margin:15px;
    }

    #opciones div{
        margin-bottom:12px;
    }

    #opciones button {
        width: 100%;
        height: 50px;
        padding-top:6px;
    }

    #btnCerrarSesion{
        background-color:#FE2E2E;
    }

    .k-button .k-image {
        height: 24px;
        float:left;
        margin-top:2px;
        margin-left:-2px;
    }

    .field-icon {
        position: relative;
        cursor: pointer;
    }
</style>

<div class="cabeceraPanel">
    <img src="img/options.png" />
    <span><% print(window.app.idioma.t('OPCIONES')) %></span>
</div>

<div id="opciones">
    <div>
        <button id="btnCerrarSesion"><% print(window.app.idioma.t('CERRAR_SESION')) %></button>
    </div>
    <div>
        <button id="btnReportarIncidencia"><% print(window.app.idioma.t('REPORTAR_INCIDENCIA')) %></button>
    </div>
    <div>
        <button id="btnCambiarPuesto"><% print(window.app.idioma.t('CAMBIAR_PUESTO')) %></button>
    </div>
    <div>
        <label><% print(window.app.idioma.t('IDIOMA')) %></label>
        <select id="selIdioma" type="text">
            <option value="es-ES"><% print(window.app.idioma.t('ESPAÑOL')) %></option>
            <option value="en-GB"><% print(window.app.idioma.t('INGLES')) %></option>
        </select>
    </div>
    <div>
        <label><% print(window.app.idioma.t('TECLADO_EN_PANTALLA')) %></label>
        <input type="checkbox" id="chkTecladoVirtual" />
    </div>
    <div>
        <button id="btnCambiarContrasenia" class='k-button k-grid-edit'><% print(window.app.idioma.t('CAMBIAR_CONTRASENIA')) %></button>
    </div>
    <div id="divCambioContrasenia" style="float: left; border:0; display:none;">
        <form id="CambiarContrasenia">
            <div style="float: left; background-color:Transparent; border:0;">
                <label id="lblAvisoCambioContrasenia"><% print(window.app.idioma.t('AVISO_CAMBIO_CONTRASENIA')) %></label>
                <br />
                <input type="password" id="txtCambioContrasenia" class="k-textbox" style="width: 197px" required /> <i class="glyphicon glyphicon-eye-open field-icon"></i>
            </div>
            <br />
            <br />
            <div>
                <button id="btnAceptar" class="k-button k-button-icontext" style="float:left; width:100px;"><% print(window.app.idioma.t("ACEPTAR")) %></button>
                <button id="btnCancelar" class="k-button k-button-icontext" style="float:left ; width:100px; margin-left:20px;"><% print(window.app.idioma.t("CANCELAR")) %></button>
            </div>
        </form>
    </div>
</div>

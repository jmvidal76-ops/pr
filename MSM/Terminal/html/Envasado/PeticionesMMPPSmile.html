<style type="text/css">


    .cabeceraVista {
        border: 1px solid black;
        width: auto;
        height: 26px;
        background-color: darkred;
        color: white;
        padding: 3px;
        padding-left: 10px;
        font-size: 20px;
    }

    #divFiltrosHeader {
        display: inline-block;
        flex-wrap: wrap;
        height: auto;
        width: 100%;
        padding-top: 5px;
    }

    #divHTMLContenido {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
    }

    #gridPeticionesMMPPSmile .k-grid-pager {
        position: sticky;
        bottom: 0;
        background: white;
        z-index: 2;
        box-shadow: 0 -2px 6px -3px #aaa;
    }

    .k-grid-content {
        overflow-y: auto !important;
        overflow-x: auto !important;
        padding-bottom: 0;
        max-height: none !important;
    }

    .k-i-calendar {
        margin-top: 30%;
    }

    .k-picker-wrap {
        width: 190px;
    }

    .k-state-default > .k-select {
        padding-top: 12px;
        display: inline-flex;
        gap: 10px;
    }

    .k-i-search {
        margin-top: 5px;
    }

    .tamanio {
        font-size: 20px;
        width: 265px !important;
    }

    .toolbar-left {
        float: left;
        gap: 6px;
    }

    .k-i-calendar {
        margin-left: 16px !important;
    }

    .toolbar-right {
        display: inline-flex;
        float: right;
        margin-top: 4px;
        margin-right: 4px;
    }

    .circle_cells {
        display: inline-block;
        width: 25px;
        height: 25px;
        border-radius: 50%;
        background-size: 25px 28px;
        background-position: center center;
        vertical-align: middle;
        line-height: 25px;
        box-shadow: inset 0 0 1px #999, inset 0 0 10px rgba(0,0,0,.2);
        margin-right: 5px;
    }


</style>

<div id="window" style="display:none">
    <span id="barcode" class="barcode"></span>
</div>


<script type="text/x-kendo-template" id="tmpToolbar">

</script>

<div id="divCabeceraVista" class="divCabeceraVista">
    <img src="img/tituloCabecera.png" height="20" style="margin-left:5px;" />
    <label class="lblCabeceraVista"><% print(window.app.idioma.t('PETICIONES_MMPP_SMILE')) %></label>
</div>

<div id="divFiltrosHeader" class="k-header" style="height: auto; width: 100%; padding-top: 5px;">
    <div class="toolbar-left">
        <label style="margin-left: 5px;"><% print(window.app.idioma.t('DESDE')) %></label>
        <input class="tamanio" id="dtpFechaDesde" style="width: 170px;" />
        <label style="margin-left: 5px;"><% print(window.app.idioma.t('HASTA')) %></label>
        <input class="tamanio" id="dtpFechaHasta" style="width: 170px;" />
        <button id="btnFiltrar" class="k-button k-button-icontext" style="margin-left: 5px; padding-left: 16px; padding-right: 12px;">
            <span class='k-icon k-i-search'></span><% print(window.app.idioma.t('CONSULTAR')) %>
        </button>
    </div>
    <div class="toolbar-right">
        <button id="btnEliminar" class="k-button k-button-icontext k-grid-delete" style="float: right; padding-left: 16px; padding-right: 12px;">
            <span class="k-icon k-delete" style="margin-top:4px;"></span><% print(window.app.idioma.t('CANCELAR')) %>
        </button>
    </div>
</div>

<div id="divContenidoVista" style="width:100%; height:100%;">
    <div id="gridPeticionesMMPPSmile"></div>
</div>

<script type="text/x-kendo-template" id="detailTemplate">
    <div>
        <div><div class="detalle"></div></div>
    </div>
</script>

<style>
    .k-detail-cell .k-tabstrip .k-content {
        padding: 0.2em;
    }

    .details ul {
        list-style: none;
        margin: 15px;
        padding: 0;
    }

        .details ul li {
            margin: 0;
            line-height: 1.7em;
        }

    .details label {
        display: inline-block;
        width: 180px;
        padding-right: 10px;
        text-align: right;
        font-style: normal;
        font-weight: bold;
    }

    .k-grid td {
        padding: 4px 4px 4px 4px;
    }

    .k-grid table {
        width: 100% !important;
    }

    .columnMenu {
        float: left;
        border-radius: 4px;
        margin-right: 5px;
        height: 26px;
    }

    .columnMenuContainer {
        max-height: 400px !important;
        overflow-y: auto !important;
    }

    .columnMenuContainer input{
        cursor: pointer;
        pointer-events: none;
    }

    @media screen and (max-width: 1024px) {
        .button-text {
            display: none;
        }
    }
</style>

<!-- CABECERA -->
<div id="divCabeceraVista" class="divCabeceraVista">
    <img src="img/tituloCabecera.png" height="20" style="margin-left: 5px;" />
    <label class="lblCabeceraVista"><% print(window.app.idioma.t('PAROS_PERDIDAS_LLENADORA')) %></label>
</div>

<!-- Filtros Cambios -->
<div id="divFiltrosHeader" class="k-header" style="height: 32px; width: 100%; padding-top: 5px;">
    <div style="float: left;">
        <label style="margin-left: 5px;"><% print(window.app.idioma.t('FILTRAR_POR')) %></label>
        <select id="selectLinea" style="width: 200px !important;"></select>
        <label style="margin-left: 5px;"><% print(window.app.idioma.t('DESDE')) %></label>
        <input id="dtpFechaDesde" style="width: 100px !important;" />
        <label style="margin-left: 5px;"><% print(window.app.idioma.t('HASTA')) %></label>
        <input id="dtpFechaHasta" style="width: 100px !important;" />
        <button id="btnFiltrar" class="k-button k-button-icontext" style="margin-left: 5px;"><span class='k-icon k-i-search'></span><% print(window.app.idioma.t('FILTRAR')) %></button>
    </div>
    <div style="float: right; margin-right: 10px;">
        <a id='btnCrearParo' class='k-button k-button-icontext k-grid-add' style='display: none; background-color: green; color: white;margin-left: 5px;'>
            <span class='k-icon k-add'></span><% print(window.app.idioma.t('CREAR_PARO')) %>
        </a>
        <button id="btnExportExcel" class="k-button k-button-icontext k-grid-excel" style="margin-left: 5px;">
            <span class="k-icon k-i-excel"></span><% print(window.app.idioma.t('EXPORTAR_EXCEL')) %>
        </button>
        <button id="btnLimpiarFiltros" class="k-button k-button-icontext k-i-delete" style="margin-left: 5px;">
            <span class='k-icon k-i-funnel-clear'></span><% print(window.app.idioma.t('QUITAR_FILTROS')) %>
        </button>
    </div>
</div>

<!-- Grid Cambios -->
<div id="gridSeleccionParosPerdidas"></div>

<script type="text/x-kendo-template" id="toolbarTemplate">
    <div class="toolbar">
        <ul id="columnMenu" class="columnMenu">
            <li data-role='menutitle' class='btnColumns' style='border-style:hidden;'>#= window.app.idioma.t('COLUMNAS') #
                <ul class='columnMenuContainer'></ul>
            </li>
        </ul>
        <select id="cmbSavedSetting" style="width: '200px'"></select>
        <button id="saveSetting" type="button" style="height:28px; margin-left:8px"><span class='k-icon k-i-plus'></span><% print(window.app.idioma.t('GUARDAR_CONFIGURACION')) %></button>
        <button id="deleteSetting" type="button" style="height:28px; margin-left:8px"><span class='k-icon k-delete'></span><% print(window.app.idioma.t('BORRAR_CONFIGURACION')) %></button>
    </div>
</script>

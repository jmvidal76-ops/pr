<style>
    .w100 {
        width: 100%
    }

    .w50 {
        width: 50%;
    }

    .mb12 {
        margin-bottom: 12px;
    }

    .mb8 {
        margin-bottom: 8px;
    }

    .mb20 {
        margin-bottom: 20px;
    }

    .mbi {
        margin-bottom: initial;
    }

    .mra {
        margin-right: auto;
    }

    .mr6 {
        margin-right: 6px;
    }

    .ml6 {
        margin-left: 6px;
    }

    .ml8 {
        margin-left: 8px;
    }

    .flex-columnas {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }

    .flex-filas {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
    }

    .flex-aic {
        align-items: center;
    }

    .flex-g1 {
        flex-grow: 1;
    }
</style>

<div style="padding:6px;">
    <form id="crearWOForm" class="mb12" style="padding:8px;border:1px solid #eee;border-radius:3px;overflow:auto;">
        <div class="flex-filas w100 mb12">
            <div class="flex-filas w100 flex-aic">
                <strong style="width:28%;"><label class="mbi" for="crearWO_inpt_linea"><% print(window.app.idioma.t('LINEA')) %></label>:</strong>
                <select id="crearWO_inpt_linea" name="crearWO_inpt_linea" style="width:72%;" required></select>
            </div>
        </div>
        <div class="flex-filas w100 mb20">
            <div class="flex-filas w100 flex-aic">
                <strong style="width:28%;"><label class="mbi" for="crearWO_inpt_producto"><% print(window.app.idioma.t('NUM_ARTICULO')) %></label>:</strong>
                <select id="crearWO_inpt_producto" name="crearWO_inpt_producto" style="width:72%;" required></select>
            </div>
        </div>
        <div class="flex-columnas w100 mb20">
            <strong><label class="mb8" for="crearWO_inpt_cantidadPalets"><% print(window.app.idioma.t('CANTIDAD')) %></label>:</strong>
            <div class="flex-filas flex-aic mb8 w100">
                <div class="flex-g1 mr6">
                    <strong for="crearWO_inpt_cantidadPalets"><% print(window.app.idioma.t('PALETS')) %>:&emsp;</strong>
                    <input id="crearWO_inpt_cantidadPalets" name="crearWO_inpt_cantidadPalets" required style="width:100px"
                           value="1"
                           data-role="numerictextbox"/>
                </div>
                <div class="flex-g1 ml6 mr6">
                    <strong for="crearWO_inpt_cantidadCajas"><% print(window.app.idioma.t('CPB')) %>:&emsp;</strong>
                    <input id="crearWO_inpt_cantidadCajas" name="crearWO_inpt_cantidadCajas" disabled style="width:100px"
                           data-role="numerictextbox"/>
                </div>
                <div class="flex-g1 ml6">
                    <strong for="crearWO_inpt_cantidadHectolitros">HL:&emsp;</strong>
                    <input id="crearWO_inpt_cantidadHectolitros" name="crearWO_inpt_cantidadHectolitros" style="width:100px"
                           value="1"
                           data-role="numerictextbox"/>
                </div>
            </div>
            <div>
                <div class="flex-filas">
                    <strong><% print(window.app.idioma.t('ENVASES')) %>:&emsp;</strong>
                    <span id="lbl_envases" style="width:80px;display:inline-flex;"></span>
                </div>
            </div>
        </div>
        <div class="flex-filas w100 mb20">
            <div class="flex-filas flex-aic w50">
                <label class="mbi" style="white-space:nowrap;" for="crearWO_inpt_fechaInicioWO"><% print(window.app.idioma.t('INICIO') + ' ' + window.app.idioma.t('WO')) %></label>:&emsp;
                <input id="crearWO_inpt_fechaInicioWO" name="crearWO_inpt_fechaInicioWO" required
                       data-role="datetimepicker"/>
            </div>
            &emsp;
            <div class="flex-filas flex-aic w50">
                <label class="mbi" style="white-space:nowrap;" for="crearWO_inpt_fechaFinWO"><% print(window.app.idioma.t('FIN') + ' ' + window.app.idioma.t('WO')) %></label>:&emsp;
                <input id="crearWO_inpt_fechaFinWO" name="crearWO_inpt_fechaFinWO" required
                       data-role="datetimepicker"/>
                <div id="fechaFinProgress" hidden>
                    <img src="../../../LibreriasJS/libs/kendoUI/styles/Default/loading.gif" style="width:100%; height: 100%" />
                </div>
            </div>
        </div>
        <div class="flex-columnas w100">
            <strong><label for="crearWO_inpt_descripcion"><% print(window.app.idioma.t('NOTA')) %></label>:</strong>
            <textarea id="crearWO_inpt_descripcion" style="width:98%;max-width:98%;padding:1%;height:50px;"></textarea>
        </div>
    </form>
    <div class="flex-filas w100" style="justify-content: flex-end;">
        <span>
            <input type="button" data-role="button" class="mr6" id="btnCrearWOAceptar" value="<% print(window.app.idioma.t('ACEPTAR')) %>" />
            <input type="button" data-role="button" class="" id="btnCrearWOCancelar" value="<% print(window.app.idioma.t('CANCELAR')) %>" />
        </span>
    </div>
</div>

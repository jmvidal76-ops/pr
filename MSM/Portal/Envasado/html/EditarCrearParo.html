<style>
    .rTable {
        display: table;
    }

    .rTableRow {
        display: table-row;
    }

    .rTableCell {
        display: table-cell;
        padding: 8px;
    }

    .borderdiv {
        border-radius: 10px !important;
        border: 1px solid #c5c5c5 !important;
    }
</style>
<div>
    <form id="EditarCrearParo">
        <div style="width: 100%;">
            <div style="float: left; background-color: Transparent; border: 0;" class="rTable">
                <div class="rTableRow" style="float: left; border: 0;">
                    <div class="rTableCell">
                        <label id="lblLinea" style="width: 150px; text-align: right;"><% print(window.app.idioma.t('LINEA')) %></label>
                    </div>
                    <div class="rTableCell">
                        <select id="cmbLineaParo" style="width: 335px" />
                    </div>
                </div>
                <div class="rTableRow" style="float: left; border: 0;">
                    <div class="rTableCell">
                        <label id="lblLlenadora" style="width: 150px; text-align: right;"><% print(window.app.idioma.t('LLENADORA')) %></label>
                    </div>
                    <div class="rTableCell">
                        <select id="cmbLlenadora" style="width: 335px" />
                    </div>
                </div>
                <div class="rTableRow" style="float: left; border: 0;">
                    <div class="rTableCell">
                        <label id="lblInicio" style="width: 150px; text-align: right;"><% print(window.app.idioma.t('INICIO_REAL')) %></label>
                    </div>
                    <div class="rTableCell">
                        <input id="txtInicioReal" style="width: 180px" />
                    </div>
                    <div class="rTableCell">
                        <label id="lblTurno" style="width: 30px; text-align: right;"><% print(window.app.idioma.t('TURNO')) %></label>
                    </div>
                    <div class="rTableCell">
                        <span id="txtTurno"></span>
                    </div>
                </div>
                <%if (tipo == 1) {%>
                <div class="rTableRow" style="float: left; border: 0;">
                    <div class="rTableCell" style="vertical-align: middle;">
                        <label id="lblDuracion" style="width: 150px; text-align: right;"><% print(window.app.idioma.t('DURACION')) %></label>
                        <br />
                    </div>
                    <div class="rTableCell">
                        <input id="txtMayorHoras" name="txtMayorHoras" style="width: 30px; float: left" />
                        <label id="Label1" style="float: left; padding-top: 5px; font-size: 15px;">:</label>
                        <input id="txtMayorMinutos" name="txtMayorMinutos" style="width: 30px; float: left" />
                        <label id="Label4" style="float: left; padding-top: 5px; font-size: 15px;">:</label>
                        <input id="txtMayorSegundos" name="txtMayorSegundos" style="width: 30px; float: left" />
                    </div>
                </div>
                <%}%>
                <%if (tipo == 2) {%>
                <div class="rTableRow" style="float: left; border: 0;">
                    <div class="rTableRow" style="float: left; border: 0;">
                        <div class="rTableCell">
                            <label id="lblDuracionPM" style="width: 150px; text-align: right;"><% print(window.app.idioma.t('DURACION_PAROS_MENORES')) %></label>
                        </div>
                        <div class="rTableCell">
                            <input id="txtMenoresHoras" name="txtMenoresHoras" style="width: 30px; float: left" />
                            <label id="Label2" style="float: left; padding-top: 5px; font-size: 15px;">:</label>
                            <input id="txtMenoresMinutos" name="txtMenoresMinutos" style="width: 30px; float: left" />
                            <label id="Label3" style="float: left; padding-top: 5px; font-size: 15px;">:</label>
                            <input id="txtMenoresSegundos" name="txtMenoresSegundos" style="width: 30px; float: left" />
                        </div>
                    </div>
                    <div class="rTableRow" style="float: left; border: 0;">
                        <div class="rTableCell">
                            <label id="lblDuracionBV" style="width: 88px; text-align: right;"><% print(window.app.idioma.t('DURACION_BAJA_VELOCIDAD')) %></label>
                        </div>
                        <div class="rTableCell">
                            <input id="txtBajaHoras" name="txtBajaHoras" style="width: 30px; float: left" />
                            <label id="Label5" style="float: left; padding-top: 5px; font-size: 15px;">:</label>
                            <input id="txtBajaMinutos" name="txtBajaMinutos" style="width: 30px; float: left" />
                            <label id="Label6" style="float: left; padding-top: 5px; font-size: 15px;">:</label>
                            <input id="txtBajaSegundos" name="txtBajaSegundos" style="width: 30px; float: left" />
                        </div>
                    </div>
                </div>
                <div class="rTableRow" style="float: left; border: 0;">
                    <!--<div class="rTableCell">-->
                        <div class="rTableCell">
                            <label id="lblNumeroPM" style="width: 140px; text-align: right;"><% print(window.app.idioma.t('NUMERO_PAROS_MENORES')) %></label>
                        </div>
                        <div class="rTableCell">
                            <input id="txtNumParoMenor" style="width: 100px" />
                        </div>
                        <div class="rTableCell">
                            <label id="lblDuracionTotal" style="width: 92px; text-align: right;"><% print(window.app.idioma.t('DURACION_TOTAL')) %></label>
                        </div>
                        <div class="rTableCell">
                            <span id="txtDuracionTotalMenores">00:00:00</span>
                        </div>
                    <!--</div>-->
                </div>
                <%}%>
            </div>
            <div style="float: left; background-color: Transparent; border: 0;" class="rTable borderdiv">
                <div style="width: 150px;">
                    <label id="lbljp" style="text-align: left; padding: 5px;"><% print(window.app.idioma.t('JUSTIFICAR_PARO')) %></label>
                </div>
                <div class="rTableRow" style="float: left; border: 0;">
                    <div class="rTableCell">
                        <label id="lblMotivo" style="width: 150px; text-align: right;"><% print(window.app.idioma.t('MOTIVO')) %></label>
                    </div>
                    <div class="rTableCell">
                        <select id="cmbMotivo" style="width: 335px" />
                    </div>
                </div>
                <div class="rTableRow" style="float: left; border: 0;">
                    <div class="rTableCell">
                        <label id="lblCausa" style="width: 150px; text-align: right;"><% print(window.app.idioma.t('CAUSA')) %></label>
                    </div>
                    <div class="rTableCell">
                        <select id="cmbCausa" style="width: 335px" />
                    </div>
                </div>
                <div class="rTableRow" style="float: left; border: 0;">
                    <div class="rTableCell">
                        <label id="lblMaquinaR" style="width: 150px; text-align: right;"><% print(window.app.idioma.t('MAQUINA_RESPONSABLE')) %></label>
                    </div>
                    <div class="rTableCell">
                        <select id="cmbMaquinaResponsable" style="width: 335px" />
                    </div>
                </div>
                <div class="rTableRow" style="float: left; border: 0;">
                    <div class="rTableCell">
                        <label id="lblEquipoCons" style="width: 150px; text-align: right;"><% print(window.app.idioma.t('EQUIPO_CONSTRUCTIVO')) %></label>
                    </div>
                    <div class="rTableCell">
                        <select id="cmbEquipoConstructivo" style="width: 335px" />
                    </div>
                </div>
                <div class="rTableRow" style="float: left; border: 0;">
                    <div class="rTableCell">
                        <label id="lblDescripcion" style="width: 150px; text-align: right;"><% print(window.app.idioma.t('DESCRIPCION')) %></label>
                    </div>
                    <div class="rTableCell">
                        <select id="cmbDescripcion" style="width: 335px" />
                    </div>
                </div>
                <div class="rTableRow" style="float: left; border: 0;">
                    <div class="rTableCell" style="vertical-align: middle;">
                        <label id="lblObs" style="width: 150px; text-align: right;"><% print(window.app.idioma.t('OBSERVACIONES')) %></label>
                    </div>
                    <div class="rTableCell">
                        <textarea id="txtObservaciones" name="txtObservaciones" style="width: 335px; height: 50px" class="keyboardOn" />
                    </div>
                </div>
            </div>
            <div class="fila" id="trError" style="display: none; text-align: center; width: 100%; float: left; margin-top: 5px">
                <span id="lblError" style="color: red;"><% print(window.app.idioma.t('SELECCIONE_VALOR_CAMPOS')) %> </span>
            </div>
            <div id="divAceptar" style="text-align: center; width: 100%; float: left; margin-top: 5px">
                <button id="btnAceptar" value="Aceptar"><% print(window.app.idioma.t("ACEPTAR")) %></button>
                <button id="btnCancelar" value="Cancelar"><% print(window.app.idioma.t("CANCELAR")) %></button>
                <button id="btnAnular"><% print(window.app.idioma.t("ANULAR")) %></button>
            </div>
        </div>
    </form>
</div>

<style>
    .circle_cells {
        display: inline-block;
        width: 25px;
        height: 25px;
        border-radius: 50%;
        background-size: 25px 28px;
        background-position: center center;
        vertical-align: middle;
        line-height: 25px;
        box-shadow: inset 0 0 1px #999, inset 0 0 10px rgba(0,0,0,.2);
        margin-right: 5px;
    }
</style>

<!-- CABECERA -->
<div id="divCabeceraVista" class="divCabeceraVista">
    <img src="img/tituloCabecera.png" height="20" style="margin-left: 5px;" />
    <label class="lblCabeceraVista"> <% print(window.app.idioma.t('AVISOS_STOCK_MMPP_FABRICACION')) %></label>
</div>

<!-- Filtros Cambios -->
<div id="divFiltrosHeader" class="k-header" style="height: 32px; width: 100%; padding-top: 5px;">
    <div style="float: right; margin-right: 10px;">
        <button id="btnAnadir" class="k-button k-button-icontext" style="margin-left: 5px;">
            <span class='k-icon k-add'></span><% print(window.app.idioma.t('ANADIR')) %>
        </button>
        <button id="btnEditar" class="k-button k-button-icontext" style="margin-left: 5px;">
            <span class='k-icon k-edit'></span><% print(window.app.idioma.t('EDITAR')) %>
        </button>
        <button id="btnEliminar" class="k-button k-button-icontext" style="margin-left: 5px;">
            <span class='k-icon k-delete'></span><% print(window.app.idioma.t('ELIMINAR')) %>
        </button>
        <button id="btnLimpiarFiltros" class="k-button k-button-icontext k-i-delete" style="margin-left: 5px;">
            <span class='k-icon k-i-funnel-clear'></span><% print(window.app.idioma.t('QUITAR_FILTROS')) %>
        </button>
        <button id="btnExportExcel" class="k-button k-button-icontext k-grid-excel" style="margin-left: 5px;">
            <span class="k-icon k-i-excel"></span><% print(window.app.idioma.t('EXPORTAR_EXCEL')) %>
        </button>
    </div>
</div>

<div id="gridAvisosStockMMPP"></div>

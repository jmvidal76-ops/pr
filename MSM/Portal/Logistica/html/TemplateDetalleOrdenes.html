<style>
    .k-detail-cell .k-tabstrip .k-content {
        padding: 0.2em;
    }

    .details ul {
        list-style: none;
        margin: 15px;
        padding: 0;
    }

        .details ul li {
            margin: 0;
            line-height: 1.5em;
        }

    .details label {
        display: inline-block;
        /*width: 140px; */
        /*width:100px;*/
        padding-right: 10px;
        text-align: right;
        font-style: normal;
        font-weight: bold;
    }

    .table {
        border: 1px solid #000000;
        margin: 2px;
    }

    .table-bordered > thead > tr > th,
    .table-bordered > tbody > tr > th,
    .table-bordered > tfoot > tr > th,
    .table-bordered > thead > tr > td,
    .table-bordered > tbody > tr > td,
    .table-bordered > tfoot > tr > td {
        border: 1px solid black;
        font-weight: normal;
    }

    .bordeFinoDashed td {
        text-align: center !important;
        border: solid 1px lightgray !important;
        line-height: 1 !important;
        padding: 3px !important;
        vertical-align: middle !important;
    }

    .rTable {
        display: table;
    }

    .rTableRow {
        display: table-row;
    }

    .rTableCell {
        display: table-cell;
        padding: 5px;
    }

    .rTableCellP {
        display: table-cell;
        padding: 5px;
    }

    .rigth {
        text-align: right;
    }

    .bold {
        font-style: normal;
        font-weight: bold;
        text-align: right;
    }

    .table > tbody > tr > td, .table > tbody > tr > th, .table > tfoot > tr > td, .table > tfoot > tr > th, .table > thead > tr > td, .table > thead > tr > th {
        padding: 0 0 0 0;
        vertical-align: middle;
    }

    .k-grid td {
        padding: .3em .3em;
        line-height: 1.6;
        vertical-align: middle;
    }

    hr {
        display: block;
        height: 1px;
        border: 0;
        border-top: 1px solid #ccc;
        margin-top: 1em;
        padding: 0;
        margin-bottom: 0em;
    }

    .produccion .k-grid-content {
        overflow-y: hidden;
    }

      .centerButton {
        padding-top: 1%;
        padding-left:40%;
    }
   
    .tabPanel .k-content {
        overflow: hidden !important;
    }
     @media (max-width: 1024px) {

           .rTable {
                display: block;
                overflow: auto;
            }
        }
</style>

<script id="templateCantidades" type="text/x-kendo-template">

                </tr>
                <tr style="background-color: whitesmoke;">

                    <td>

                        <label style="font-weight: normal !important; text-align: center!important;">#= (isNaN(produccion.cantidadEnvasesNoConformidad * producto.hectolitros) ? 0 : (produccion.cantidadEnvasesNoConformidad * producto.hectolitros).toFixed(2)) #</label></td>

                <tr style="background-color: white;">
                    <td style="text-align: left !important;"><% print(window.app.idioma.t('TOTALES'))%></td>

                        <label class="cajasPlanificadas" style="font-weight: normal !important; text-align: center!important;">#= (((produccion.paletsProducidos - (isNaN(produccion.cantidadPicosPalets) ? 0 : produccion.cantidadPicosPalets)) * CajasPorPalet) +  (isNaN(produccion.cantidadPicosCajas) ? 0 : produccion.cantidadPicosCajas)) #</label></td>
                    <td>
                        <label style="font-weight: normal !important; text-align: center!important;">#= ((((produccion.paletsProducidos - (isNaN(produccion.cantidadPicosPalets) ? 0 : produccion.cantidadPicosPalets)) * CajasPorPalet) +  (isNaN(produccion.cantidadPicosCajas) ? 0 : produccion.cantidadPicosCajas)) * (isNaN(Math.floor(EnvasesPorPalet/CajasPorPalet)) ? 0 : isFinite(Math.floor(EnvasesPorPalet/CajasPorPalet)) ? Math.floor(EnvasesPorPalet/CajasPorPalet) : 0)) #</label></td>
                    <td>
                        <label style="font-weight: normal !important; text-align: center!important;">#= ((((((produccion.paletsProducidos - (isNaN(produccion.cantidadPicosPalets) ? 0 : produccion.cantidadPicosPalets)) * CajasPorPalet) +  (isNaN(produccion.cantidadPicosCajas) ? 0 : produccion.cantidadPicosCajas)) * (isNaN(Math.floor(EnvasesPorPalet/CajasPorPalet)) ? 0 : isFinite(Math.floor(EnvasesPorPalet/CajasPorPalet)) ? Math.floor(EnvasesPorPalet/CajasPorPalet) : 0)) * producto.hectolitros).toFixed(2)) #</label></td>

<style>
    .cabeceraVista {
        border: 1px solid black;
        width: auto;
        height: 26px;
        background-color: darkred;
        color: white;
        padding: 3px;
        padding-left: 10px;
        font-size: 16px;
    }

    #opciones{
        margin:15px;
    }

    #opciones button {
        width: 100%;
        height: 30px;
        padding-top:4px;
        margin-bottom:8px;
    }

    #btnCerrarSesion{
        background-color:#FE2E2E;
    }

    .k-button .k-image {
        height: 24px;
        float:left;
        margin-top:-2px;
        margin-left:-2px;
    }

    .field-icon {
        position: relative;
        cursor: pointer;
    }
</style>

<div class="cabeceraVista">
    <img src="img/iconoCabecera.png" />
    <span><% print(window.app.idioma.t('OPCIONES')) %></span>
</div>

<div id="opciones">
    <div><button id="btnCerrarSesion"><% print(window.app.idioma.t('CERRAR_SESION')) %></button></div>
    <div><button id="btnReportarIncidencia"><% print(window.app.idioma.t('REPORTAR_INCIDENCIA')) %></button></div>
    <div>
        <label><% print(window.app.idioma.t('IDIOMA')) %></label>
        <select id="selIdioma" type="text" style="width: 100%;">
            <option value="es-ES"><% print(window.app.idioma.t('ESPAÑOL')) %></option><option value="en-GB"><% print(window.app.idioma.t('INGLES')) %></option>
        </select>
    </div>
    <br />
    <div><button id="btnCambiarContrasenia" class='k-button k-grid-edit'><% print(window.app.idioma.t('CAMBIAR_CONTRASENIA')) %></button></div>
    <div id="divCambioContrasenia" style="float: left; border:0; display:none;">
        <form id="CambiarContrasenia">
            <div style="float: left; background-color:Transparent; border:0;">
                <label id="lblAvisoCambioContrasenia"><% print(window.app.idioma.t('AVISO_CAMBIO_CONTRASENIA')) %></label>
                <br />
                <input type="password" id="txtCambioContrasenia" class="k-textbox" style="width: 153px" required /> <i class="glyphicon glyphicon-eye-open field-icon"></i>
            </div>
            <br />
            <br />
            <br />
            <div>
                <button id="btnAceptar" class="k-button k-button-icontext" style="float:left; width:80px; margin-top:10px;"><% print(window.app.idioma.t("ACEPTAR")) %></button>
                <button id="btnCancelar" class="k-button k-button-icontext" style="float:left ; width:80px; margin-left:10px; margin-top:10px;"><% print(window.app.idioma.t("CANCELAR")) %></button>
            </div>
        </form>
    </div>
</div>

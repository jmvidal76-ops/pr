<style>

    .k-detail-cell .k-tabstrip .k-content {
        padding: 0.2em;
    }

    .details ul {
        list-style: none;
        margin: 15px;
        padding: 0;
    }

        .details ul li {
            margin: 0;
            line-height: 1.5em;
        }

    .details label {
        display: inline-block;
        width: 140px;
        padding-right: 10px;
        text-align: right;
        font-style: normal;
        font-weight: bold;
    }

    .table {
        border: 1px solid #000000;
        margin: 2px;
    }

    .table-bordered > thead > tr > th,
    .table-bordered > tbody > tr > th,
    .table-bordered > tfoot > tr > th,
    .table-bordered > thead > tr > td,
    .table-bordered > tbody > tr > td,
    .table-bordered > tfoot > tr > td {
        border: 1px solid black;
        font-weight: normal;
    }

    .bordeFinoDashed td {
        text-align: center !important;
        border: solid 1px lightgray !important;
    }

    .rTable {
        display: table;
    }

    .rTableRow {
        display: table-row;
    }

    .rTableCell {
        display: table-cell;
        padding: 10px;
    }

    .rigth {
        text-align: right;
    }

    .bold {
        font-style: normal;
        font-weight: bold;
        text-align: right;
    }

    .lblCabeceraVista {
        margin-right: 0px !important;
    }

    .circle_cells {
        display: inline-block;
        width: 25px;
        height: 25px;
        border-radius: 50%;
        background-size: 25px 28px;
        background-position: center center;
        vertical-align: middle;
        line-height: 25px;
        box-shadow: inset 0 0 1px #999, inset 0 0 10px rgba(0,0,0,.2);
        margin-right: 5px;
    }

    .circle_desc {
        display: inline-block;
        vertical-align: middle;
        line-height: 32px;
        padding-left: 3px;
    }
</style>

<!-- CABECERA -->
<div id="divCabeceraVista" class="divCabeceraVista">
    <img src="img/tituloCabecera.png" height="20" style="margin-left: 5px;" />
    <label class="lblCabeceraVista" id="lblCabeceraListadoWO"><% print(window.app.idioma.t('GESTION_WO_NOACTIVAS')) %></label>
    <label class="lblCabeceraVista" id="lblCabeceraDetalle" style="display:none">/ <% print(window.app.idioma.t('DETALLE')) %></label>
</div>
<!-- BOTONES -->
<div id="divFiltrosHeader" class="k-header" style="height: 32px; width: 100%; padding-top: 5px;">
    <div style="float: left;">
        <label style="margin-left: 5px;"><% print(window.app.idioma.t('DESDE')) %></label>
        <input id="dtpFechaInicio" style="width: 100px;"/>
        <label style="margin-left: 5px;"><% print(window.app.idioma.t('HASTA')) %></label>
        <input id="dtpFechaFin" style="width: 100px;"/>
        <button id="btnFiltrar" class="k-button k-button-icontext" style="margin-left: 5px;"><span class='k-icon k-i-search'></span><% print(window.app.idioma.t('FILTRAR')) %></button>
    </div>
    <div style="float: right; margin-right: 10px;">
        <button id="btnLimpiarFiltros" class="k-button k-button-icontext k-i-delete" style="margin-left: 5px;"><span class='k-icon k-i-funnel-clear'></span><% print(window.app.idioma.t('QUITAR_FILTROS')) %></button>
    </div>
</div>
<!--GRID HISTORICO -->
<div id="gridGestionWOHistorico"></div>

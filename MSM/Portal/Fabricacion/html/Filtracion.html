<style type="text/css">
    .contenedores {
        width: 100%;
        float: left;
        height: 15%;
        padding: 1%;
        -webkit-box-shadow: inset -1px 2px 76px 12px rgba(245,246,246,0.58);
        -moz-box-shadow: inset -1px 2px 76px 12px rgba(245,246,246,0.58);
        box-shadow: inset -1px 2px 76px 12px rgba(245,246,246,0.58);
    }

    .btns {
        width: 7%;
        height: 7%;
        position: absolute;
        left: 85%;
        top: 10%;
        opacity: 0.3;
        filter: alpha(opacity=30); /* For IE8 and earlier */
    }

        .btns:hover {
            opacity: 1.0;
            filter: alpha(opacity=100); /* For IE8 and earlier */
        }

    .etiqueta {
        display: block;
        clear: both;
        font-weight: bolder;
        font-size: large;
    }

    .subcontenedor {
        width: 100%;
        height: 100%;
        float: left;
    }

    /*.activo {
        margin-left: 2%;
        width: 3%;
        height: 100%;
        float: left;
        text-align: center;
        background-color: lightgreen;
    }*/

    .pic {
        margin-left: 2%;
        width: 13%;
        height: 100%;
        float: left;
        border: solid 2px #E9E9E9;
        padding-top: 5px;
    }

    .info {
        margin-left: 2%;
        width: 80%;
        height: 100%;
        float: left;
        border: solid 2px #E9E9E9;
    }

    .lineasinfo {
        height: 33%;
        width: 100%;
        float: left;
        padding-left: 1%;
    }

    .textosinfo {
        width: 31%;
        float: left;
        height: 100%;
    }

    .lbl {
        width: 35%;
        float: left;
        text-align: left;
        font-weight: 600 !important;
    }

    .txt {
        width: 65%;
        float: left;
        text-align: left;
        font-weight: 500 !important;
    }

    .textosinfo2 {
        width: 39%;
        float: left;
        height: 100%;
    }

    .textosinfo3 {
        width: 30%;
        float: left;
        height: 100%;
    }

    .k-state-selected {
        background-color: #F1C40F;
        border-color: #F1C40F;
    }

    .progress {
        width: 25%;
        float: left;
        text-align: center;
        height: 80%;
    }

    .equipo {
        float: left;
        height: 20%;
        width: 100%;
        font-weight: bold;
        text-align: center;
        padding-top: 2%;
        font-size: large;
    }

    .img {
        width: 70%;
        float: left;
        text-align: center;
        height: 80%;
    }
</style>

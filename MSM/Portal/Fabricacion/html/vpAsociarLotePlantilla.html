<style>
    .k-window div.k-window-content {
        overflow: hidden;
    }

    #gridAsociarLote .k-grid-norecords {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .headerRed {
        color: #d90000;
    }
</style>
<div id="gridAsociarLote" style="width: 100%;height: 98%;overflow:hidden"></div>

<script type="text/x-kendo-template" id="template">
    <label class='headerRed'><% print(window.app.idioma.t('LOTES_A_CONSUMIR_EN_ORDEN')) %></label>
    <button class='k-button k-AsociarUbicacion' id='btnAceptar' style='background-color:green;color:white;'><% print(window.app.idioma.t('GUARDAR')) %> </button>
    <button class='k-button k-AsociarUbicacion' id='btnReiniciarSeleccion'><% print(window.app.idioma.t('REINICIAR_SELECCION')) %> </button>

</script>

<script type="text/x-kendo-template" id="templateHeaderDialog">
    <div>
        <h3><% print(window.app.idioma.t('PLANTILLA_SELECCIONADA')) %></h3>
        <label>#: DescPlantilla#</label>
        <h3><% print(window.app.idioma.t('UBICACION')) %></h3>
        <label>#: Ubicacion#</label>
        <h3><% print(window.app.idioma.t('MATERIAL')) %></h3>
        <label>#: Material#</label>
    </div>

</script>

<div id="divCabeceraVista" class="divCabeceraVista">
    <img src="img/tituloCabecera.png" height="20" style="margin-left:5px;" />
    <label class="lblCabeceraVista"><% print(window.app.idioma.t('FACTURACION_SUBPRODUCTOS')) %></label>
</div>
<div class="divContenidoVista">
    <div id="divFiltrosHeader" class="k-header" style="height: 32px; width: 100%; padding-top: 5px; display: flex; flex-direction: row; justify-content: space-between;">
        <div style="display: flex; flex-direction: row; align-items: center;">
            <label style="margin-left: 5px; margin-right:6px;"><% print(window.app.idioma.t('DESDE')) %></label>
            <input id="dtpFechaDesde" style="max-width: 100px;" />
            <label style="margin-left: 5px; margin-right: 6px;"><% print(window.app.idioma.t('HASTA')) %></label>
            <input id="dtpFechaHasta" style="max-width: 100px; " />
            <button id="btnFiltrar" class="k-button k-button-icontext" style="margin-left: 8px;"><span class='k-icon k-i-search'></span><% print(window.app.idioma.t('CONSULTAR')) %></button>
        </div>
        <div style="float: right;">
            <button id="btnExportarExcel" class="k-button k-button-icontext k-grid-excel" style="margin-right: 6px;">
                <span class="k-icon k-i-excel"></span><% print(window.app.idioma.t('EXPORTAR_EXCEL')) %>
            </button>
            <button id="btnFacturar" class="k-button k-button-icontext k-grid-excel" data-funcion='CDG_FAC_SUB_1_EnvioFacturacionSubproductos' style="margin-right: 6px;">
                <span><img src='../../../Common/img/factura.png' style='width: 18px; opacity: 0.8;' /></span>
                <% print(window.app.idioma.t('ENVIAR_A_FACTURACION')) %>
            </button>
        </div>
    </div>
    <div id="gridFacturacionSubproductos"></div>
</div>

<style>
    #msgDialogo {
        width: auto;
        font-size: 14px;
        border-bottom:1px solid black;
        margin-bottom:5px;
        margin-top:5px;
        padding:6px;
        text-align:justify;
    }

    #opciones {
        margin: 15px;
    }
     #imgProcesando {
        margin: 15px;
        margin-left:38px;
        display:none;
    }
    #botones button {
        width: 120px;
        height: 30px;
        padding-top: 4px;
        margin: 8px;
        margin-left:20px;
        float:left;
    }

    .k-button .k-image {
        height: 24px;
        float: left;
        margin-left: 4px;
    }

</style>

<div id="msgDialogo">
    <%= msg %>
</div>
<div id="imgProcesando">
    <img src="img/ajax-loader.gif"/>
</div>
<div id="botones">
    <div><button id="btnAceptar"><% print(window.app.idioma.t('ACEPTAR')) %></button></div>
    <div><button id="btnCancelar"><% print(window.app.idioma.t('CANCELAR')) %></button></div>
</div>
